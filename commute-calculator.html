<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>通勤時間コスト計算機</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #1e2230;
    --surface: #262d40;
    --surface2: #2e3750;
    --border: #3a4460;
    --text: #f0f2f8;
    --muted: #9aa5c4;
    --accent: #f0c040;
    --accent2: #f07070;
    --green: #4fd6a0;
    --blue: #70c0f0;
    --font-body: 'Noto Sans JP', sans-serif;
    --font-mono: 'DM Mono', monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    min-height: 100vh;
    padding: 24px 16px 60px;
  }
  header {
    margin-bottom: 32px;
    border-left: 3px solid var(--accent);
    padding-left: 16px;
  }
  header h1 { font-size: 1.4rem; font-weight: 700; color: var(--accent); }
  header p  { font-size: 0.78rem; color: var(--muted); margin-top: 4px; }

  .controls {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 28px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }
  .control-group { display: flex; flex-direction: column; gap: 6px; }
  label { font-size: 0.72rem; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; }
  input[type=range] {
    -webkit-appearance: none;
    width: 100%; height: 4px;
    background: var(--border); border-radius: 2px; outline: none;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 16px; height: 16px; border-radius: 50%;
    background: var(--accent); cursor: pointer; border: 2px solid var(--bg);
  }
  .val-display { font-family: var(--font-mono); font-size: 1.05rem; color: var(--accent); font-weight: 500; }
  select {
    background: var(--surface2); color: var(--text); border: 1px solid var(--border);
    border-radius: 6px; padding: 6px 8px; font-size: 0.85rem; font-family: var(--font-body);
    width: 100%; cursor: pointer; outline: none;
  }
  .min-wage-tag { font-size: 0.7rem; color: var(--accent); margin-top: 2px; }

  .section-title {
    font-size: 0.72rem; letter-spacing: 0.12em; text-transform: uppercase;
    color: #aaa; margin-bottom: 12px; padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }
  .table-wrap {
    overflow-x: auto; margin-bottom: 28px;
    border-radius: 12px; border: 1px solid var(--border);
  }
  table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
  thead tr { background: var(--surface2); }
  th {
    padding: 12px 14px; text-align: center;
    font-size: 0.7rem; letter-spacing: 0.08em; text-transform: uppercase;
    color: #bbb; font-weight: 500; white-space: nowrap;
  }
  th:first-child { text-align: left; }
  td {
    padding: 12px 14px; text-align: center;
    border-top: 1px solid var(--border);
    font-family: var(--font-mono); font-size: 0.82rem; white-space: nowrap;
  }
  td:first-child { font-family: var(--font-body); text-align: left; font-size: 0.8rem; }
  tr.highlight { background: rgba(240,192,64,0.06); }
  tr.highlight td:first-child::after {
    content: " ←基準"; font-size: 0.65rem; color: var(--accent); margin-left: 4px;
  }
  .tag-good { color: var(--green); }
  .tag-bad  { color: var(--accent2); }
  .tag-mid  { color: var(--blue); }
  .stress-bar { display: inline-flex; gap: 2px; align-items: center; }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--border); }
  .dot.on { background: var(--accent2); }

  .cards {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 12px; margin-bottom: 28px;
  }
  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 16px;
  }
  .card-label { font-size: 0.68rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 6px; line-height: 1.5; }
  .card-val   { font-family: var(--font-mono); font-size: 1.3rem; font-weight: 500; }
  .card-sub   { font-size: 0.68rem; color: var(--muted); margin-top: 4px; }
  .card.positive { border-color: rgba(90,224,160,0.3); }
  .card.negative { border-color: rgba(224,90,90,0.3); }

  .insight {
    background: var(--surface); border: 1px solid var(--border);
    border-left: 3px solid var(--accent); border-radius: 10px;
    padding: 16px; font-size: 0.8rem; line-height: 1.8; color: #bbb;
  }
  .insight strong { color: var(--accent); font-weight: 500; }
  .note { font-size: 0.68rem; color: var(--muted); margin-top: 10px; line-height: 1.6; }
</style>
</head>
<body>

<header>
  <h1>通勤時間コスト 比較表</h1>
  <p>交通費支給あり ／ 時給 1,500〜2,000円帯 ／ 車・バイク通勤</p>
</header>

<div class="controls">
  <div class="control-group" style="grid-column:1/-1">
    <label>都道府県（最低賃金を自動設定）</label>
    <select id="pref"><option value="">-- 選択してください --</option></select>
    <span class="min-wage-tag" id="min-wage-tag"></span>
  </div>
  <div class="control-group">
    <label>時給</label>
    <input type="range" id="wage" min="1000" max="2500" step="10" value="1600">
    <span class="val-display" id="wage-val">1,600 円/h</span>
  </div>
  <div class="control-group">
    <label>1日の労働時間</label>
    <input type="range" id="hours" min="4" max="10" step="0.5" value="8">
    <span class="val-display" id="hours-val">8.0 時間</span>
  </div>
  <div class="control-group">
    <label>月の出勤日数</label>
    <input type="range" id="days" min="10" max="25" step="1" value="20">
    <span class="val-display" id="days-val">20 日</span>
  </div>
</div>

<p class="section-title">シナリオ別 比較</p>

<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th>片道距離</th>
        <th>通勤時間<br>(片道)</th>
        <th>1日の<br>拘束時間</th>
        <th>実質時給<br>(通勤込み)</th>
        <th>月収入</th>
        <th>月の通勤<br>時間ロス</th>
        <th>ストレス</th>
      </tr>
    </thead>
    <tbody id="table-body"></tbody>
  </table>
</div>

<div class="cards" id="cards"></div>
<div class="insight" id="insight"></div>
<p class="note">※ 通勤時間はおおよその目安です。燃料費・駐車場代・高速代は計算に含んでいません（交通費支給を想定）。</p>

<script>
  const prefData = [
    {name:"北海道", min:1075}, {name:"青森県", min:1029}, {name:"岩手県", min:1031},
    {name:"宮城県", min:1038}, {name:"秋田県", min:1031}, {name:"山形県", min:1032},
    {name:"福島県", min:1033}, {name:"茨城県", min:1074}, {name:"栃木県", min:1068},
    {name:"群馬県", min:1063}, {name:"埼玉県", min:1141}, {name:"千葉県", min:1140},
    {name:"東京都", min:1226}, {name:"神奈川県", min:1225}, {name:"新潟県", min:1050},
    {name:"富山県", min:1062}, {name:"石川県", min:1054}, {name:"福井県", min:1053},
    {name:"山梨県", min:1052}, {name:"長野県", min:1061}, {name:"岐阜県", min:1065},
    {name:"静岡県", min:1097}, {name:"愛知県", min:1140}, {name:"三重県", min:1087},
    {name:"滋賀県", min:1080}, {name:"京都府", min:1122}, {name:"大阪府", min:1177},
    {name:"兵庫県", min:1116}, {name:"奈良県", min:1051}, {name:"和歌山県", min:1045},
    {name:"鳥取県", min:1030}, {name:"島根県", min:1033}, {name:"岡山県", min:1047},
    {name:"広島県", min:1085}, {name:"山口県", min:1043}, {name:"徳島県", min:1046},
    {name:"香川県", min:1036}, {name:"愛媛県", min:1033}, {name:"高知県", min:1023},
    {name:"福岡県", min:1057}, {name:"佐賀県", min:1030}, {name:"長崎県", min:1031},
    {name:"熊本県", min:1034}, {name:"大分県", min:1035}, {name:"宮崎県", min:1023},
    {name:"鹿児島県", min:1026}, {name:"沖縄県", min:1023}
  ];

  // Populate select
  const sel = document.getElementById('pref');
  prefData.forEach(p => {
    const opt = document.createElement('option');
    opt.value = p.min;
    opt.textContent = p.name + '  （' + p.min + '円）';
    sel.appendChild(opt);
  });

  sel.addEventListener('change', () => {
    const minWage = parseInt(sel.value);
    if (!minWage) return;
    const wageSlider = document.getElementById('wage');
    const current = parseInt(wageSlider.value);
    if (current < minWage) {
      wageSlider.value = minWage;
    }
    wageSlider.min = minWage;
    document.getElementById('min-wage-tag').textContent = '最低賃金: ' + minWage.toLocaleString() + '円 ／ スライダー下限を更新しました';
    update();
  });

    const scenarios = [
    { label: "徒歩圏 〜2km",   min: 5,  stress: 1 },
    { label: "近場 5km",       min: 12, stress: 1 },
    { label: "普通 10km",      min: 20, stress: 2 },
    { label: "やや遠 20km",    min: 35, stress: 3 },
    { label: "遠め 30km",      min: 45, stress: 4 },
    { label: "かなり遠 50km",  min: 70, stress: 5 },
  ];

  function fmt(n, d=0) {
    return Math.round(n).toLocaleString('ja-JP', {minimumFractionDigits:d, maximumFractionDigits:d});
  }
  function stressBar(level) {
    let h = '<span class="stress-bar">';
    for(let i=1;i<=5;i++) h += `<span class="dot ${i<=level?'on':''}"></span>`;
    return h + '</span>';
  }
  const stressLabel = ['','低','低め','中','高め','高'];

  function update() {
    const wage  = +document.getElementById('wage').value;
    const workH = +document.getElementById('hours').value;
    const days  = +document.getElementById('days').value;

    document.getElementById('wage-val').textContent  = `${wage.toLocaleString()} 円/h`;
    document.getElementById('hours-val').textContent = `${workH.toFixed(1)} 時間`;
    document.getElementById('days-val').textContent  = `${days} 日`;

    const baseMonthly = wage * workH * days;
    let tbody = '', results = [];

    scenarios.forEach((s, i) => {
      const commuteH   = (s.min * 2) / 60;
      const totalH     = workH + commuteH;
      const effWage    = wage * workH / totalH;
      const monthLoss  = commuteH * days;
      results.push({ effWage, monthLoss, commuteH, totalH });

      const isBase = i === 1;
      const wClass = effWage >= wage * 0.92 ? 'tag-good' : effWage >= wage * 0.80 ? 'tag-mid' : 'tag-bad';
      const tClass = totalH > workH + 1 ? 'tag-bad' : '';
      const lClass = monthLoss > 10 ? 'tag-bad' : monthLoss > 5 ? 'tag-mid' : '';

      tbody += `<tr ${isBase ? 'class="highlight"' : ''}>
        <td>${s.label}</td>
        <td>${s.min} 分</td>
        <td class="${tClass}">${totalH.toFixed(1)} h</td>
        <td class="${wClass}">${fmt(effWage)} 円</td>
        <td>${fmt(baseMonthly)} 円</td>
        <td class="${lClass}">${fmt(monthLoss,1)} h</td>
        <td>${stressBar(s.stress)} ${stressLabel[s.stress]}</td>
      </tr>`;
    });

    document.getElementById('table-body').innerHTML = tbody;

    const near = results[1]; // 5km
    const far  = results[4]; // 30km
    const wageDiff = near.effWage - far.effWage;
    const timeDiff = far.monthLoss - near.monthLoss;
    const oppCost  = timeDiff * wage;

    document.getElementById('cards').innerHTML = `
      <div class="card positive">
        <div class="card-label">実質時給の差<br>(5km vs 30km)</div>
        <div class="card-val tag-good">+${fmt(wageDiff)} 円/h</div>
        <div class="card-sub">近い方が実質的に高時給</div>
      </div>
      <div class="card negative">
        <div class="card-label">月の通勤時間ロス<br>(5km→30km に増えると)</div>
        <div class="card-val tag-bad">+${fmt(timeDiff,1)} 時間</div>
        <div class="card-sub">月${days}日出勤の場合</div>
      </div>
      <div class="card negative">
        <div class="card-label">その時間の機会費用<br>(同じ時給で換算)</div>
        <div class="card-val tag-bad">${fmt(oppCost)} 円</div>
        <div class="card-sub">働けたはずの金額</div>
      </div>
      <div class="card">
        <div class="card-label">30km通勤の<br>月間拘束時間合計</div>
        <div class="card-val tag-mid">${fmt(results[4].totalH * days,1)} h</div>
        <div class="card-sub">労働＋通勤の合計</div>
      </div>
    `;

    document.getElementById('insight').innerHTML = `
      <strong>💡 まとめ</strong><br>
      時給 ${wage.toLocaleString()}円・月${days}日出勤の場合、<br>
      片道 <strong>5km（約12分）</strong> → 実質時給 <strong>${fmt(near.effWage)}円</strong>、月の通勤ロス <strong>${fmt(near.monthLoss,1)}時間</strong><br>
      片道 <strong>30km（約45分）</strong> → 実質時給 <strong>${fmt(far.effWage)}円</strong>、月の通勤ロス <strong>${fmt(far.monthLoss,1)}時間</strong><br><br>
      交通費が全額支給されても、<strong>「時間」というコストは取り返せません。</strong>
      通勤で失う月 <strong>${fmt(timeDiff,1)}時間</strong> は、同じ時給なら <strong>${fmt(oppCost)}円分</strong> の価値があります。
    `;
  }

  ['wage','hours','days'].forEach(id =>
    document.getElementById(id).addEventListener('input', update)
  );
  update();
</script>
</body>
</html>
